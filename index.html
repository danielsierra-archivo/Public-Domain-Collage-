<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PUBLIC DOMAIN ARCHITECTURE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f6;
  --white: #ffffff;
  --black: #111110;
  --gray: #999;
  --light: #e8e8e4;
  --accent: #1a1a18;
  --border: #e0e0da;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--black); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

/* HEADER */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; border-bottom: 1px solid var(--border);
  background: var(--white); z-index: 200;
}
.logo-wrap { display: flex; align-items: baseline; gap: 10px; }
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 0.18em;
  color: var(--black); line-height: 1; display: inline-flex;
}
.logo .char { display: inline-block; animation: charIn 0.05s ease forwards; opacity: 0; }
@keyframes charIn { to { opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.logo-sub {
  font-family: 'DM Serif Display', serif;
  font-style: italic; font-size: 15px;
  color: var(--gray); letter-spacing: 0.02em;
  animation: pulse 4s ease-in-out infinite;
  animation-delay: 1.5s;
}
.header-right { display: flex; align-items: center; gap: 8px; }
.btn {
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 6px 14px; border: 1px solid var(--border);
  background: transparent; color: var(--gray); cursor: pointer;
  transition: all 0.15s; border-radius: 2px;
}
.btn:hover { border-color: var(--black); color: var(--black); }
.btn-primary { background: var(--black); color: var(--white); border-color: var(--black); }
.btn-primary:hover { background: #333; border-color: #333; }
.btn.active { background: var(--black); color: var(--white); border-color: var(--black); }

/* LAYOUT */
.app { display: flex; position: fixed; top: 52px; bottom: 28px; left: 0; right: 0; }

/* SIDEBAR */
.sidebar {
  width: 230px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  background: var(--white); overflow: hidden;
}
.nav { display: flex; flex-direction: column; overflow-y: auto; flex: 1; }
.nav::-webkit-scrollbar { width: 3px; }
.nav::-webkit-scrollbar-thumb { background: var(--border); }
.nav.hidden { display: none; }

/* SEARCH */
.search-wrap {
  padding: 12px; border-bottom: 1px solid var(--border);
  display: flex; gap: 6px; flex-shrink: 0;
}
.search-input {
  flex: 1; font-family: 'DM Sans', sans-serif; font-size: 11px;
  letter-spacing: 0.04em; padding: 7px 10px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--black); outline: none; border-radius: 2px;
}
.search-input::placeholder { color: var(--gray); }
.search-input:focus { border-color: var(--black); }
.search-btn {
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  padding: 7px 12px; background: var(--black); border: none;
  color: var(--white); cursor: pointer; border-radius: 2px;
  transition: background 0.15s; flex-shrink: 0;
}
.search-btn:hover { background: #333; }

/* NAV ITEMS */
.nav-item {
  border-bottom: 1px solid var(--border);
}
.nav-btn {
  width: 100%; font-family: 'DM Sans', sans-serif;
  font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
  font-weight: 400; padding: 14px 16px;
  background: transparent; border: none; color: var(--gray);
  cursor: pointer; text-align: left; transition: all 0.15s;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-btn:hover, .nav-btn.active { color: var(--black); }
.nav-btn.active { font-weight: 500; }
.nav-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border); flex-shrink: 0;
  transition: background 0.15s;
}
.nav-btn.active .nav-dot { background: var(--black); }

.random-btn {
  width: 100%; font-family: 'DM Serif Display', serif;
  font-style: italic; font-size: 16px;
  padding: 14px 16px; background: transparent; border: none;
  border-top: 1px solid var(--border); color: var(--gray);
  cursor: pointer; text-align: left; transition: color 0.15s;
  margin-top: auto;
}
.random-btn:hover { color: var(--black); }

/* LIBRARY PANEL */
.library-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.library-panel.visible { display: flex; }
.library-back {
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 12px 16px; background: transparent; border: none;
  border-bottom: 1px solid var(--border); color: var(--gray);
  cursor: pointer; text-align: left; transition: color 0.15s; flex-shrink: 0;
}
.library-back:hover { color: var(--black); }
.library-cat-label {
  font-family: 'DM Sans', sans-serif; font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px; color: var(--black); font-weight: 500;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}

/* LIBRARY GRID */
.library {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 8px; display: grid;
  grid-template-columns: 1fr 1fr; gap: 4px;
  align-content: start; width: 100%;
}
.library::-webkit-scrollbar { width: 3px; }
.library::-webkit-scrollbar-thumb { background: var(--border); }
.lib-img {
  position: relative; width: 100%; padding-bottom: 130%;
  overflow: hidden; cursor: pointer; background: var(--light);
  transition: opacity 0.2s;
}
.lib-img:hover { opacity: 0.85; }
.lib-img img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; object-fit: cover;
  display: block; pointer-events: none;
}
.lib-img .overlay {
  position: absolute; inset: 0;
  background: rgba(17,17,16,0.12);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
  font-family: 'DM Sans', sans-serif; font-size: 20px;
  color: var(--white); font-weight: 300;
}
.lib-img:hover .overlay { opacity: 1; }
.lib-msg {
  grid-column: 1/-1; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--gray);
  padding: 20px 0; text-align: center;
}

/* CANVAS */
.canvas-wrap {
  flex: 1; position: relative; overflow: hidden; background: var(--bg);
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  background-opacity: 0.3;
}
.canvas-hint {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none; gap: 8px; transition: opacity 0.3s;
}
.canvas-hint-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(40px, 6vw, 80px);
  letter-spacing: 0.12em; color: var(--black); opacity: 0.05;
  line-height: 1.1; text-align: center;
}
.canvas-hint-sub {
  font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gray); opacity: 0.5;
}

/* CANVAS ITEMS */
.c-item { position: absolute; cursor: grab; user-select: none; }
.c-item:active { cursor: grabbing; }
.c-item.selected .c-inner { outline: 1.5px solid var(--black); outline-offset: 2px; }
.c-inner { position: relative; width: 100%; height: 100%; }
.c-item img { width: 100%; height: auto; display: block; pointer-events: none; }
.c-controls { position: absolute; top: -28px; right: 0; display: none; gap: 2px; }
.c-item.selected .c-controls { display: flex; }
.c-ctrl {
  width: 24px; height: 24px; background: var(--black); color: var(--white);
  font-size: 11px; font-family: 'DM Sans', sans-serif; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.1s; border-radius: 2px;
}
.c-ctrl:hover { background: #444; }
.c-resize {
  position: absolute; bottom: 0; right: 0; width: 12px; height: 12px;
  background: var(--black); cursor: se-resize; display: none; border-radius: 2px 0 0 0;
}
.c-item.selected .c-resize { display: block; }

/* STATUSBAR */
.statusbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
  display: flex; align-items: center; padding: 0 20px; gap: 24px;
  border-top: 1px solid var(--border); background: var(--white); z-index: 200;
}
.statusbar span {
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray);
}

/* MOBILE */
.toggle-sidebar {
  display: none; font-family: 'DM Sans', sans-serif; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 12px;
  background: transparent; border: 1px solid var(--border); color: var(--gray); cursor: pointer;
  border-radius: 2px;
}
.toggle-sidebar:hover { color: var(--black); border-color: var(--black); }
@media (max-width: 640px) {
  .sidebar { position: fixed; left: 0; top: 52px; bottom: 28px; transform: translateX(-100%); transition: transform 0.2s; z-index: 150; }
  .sidebar.open { transform: translateX(0); }
  .canvas-wrap { width: 100%; }
  .toggle-sidebar { display: flex; }
}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo" id="logoText"></span>
    <span class="logo-sub">Collage</span>
  </div>
  <div class="header-right">
    <button class="toggle-sidebar" id="toggleSidebar">Imágenes</button>
    <button class="btn" id="colorBtn">B&amp;N</button>
    <button class="btn" id="clearBtn">Limpiar</button>
    <button class="btn btn-primary" id="downloadBtn">Descargar</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <nav class="nav" id="navMenu">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="Buscar...">
        <button class="search-btn" id="searchBtn">→</button>
      </div>

      <div class="nav-item">
        <button class="nav-btn" data-q="historic building architecture photograph facade exterior">
          Edificios <span class="nav-dot"></span>
        </button>
      </div>
      <div class="nav-item">
        <button class="nav-btn" data-q="architectural drawing plan blueprint elevation section vintage">
          Planos y dibujos <span class="nav-dot"></span>
        </button>
      </div>
      <div class="nav-item">
        <button class="nav-btn" data-q="ancient ruins archaeology Greece Rome Egypt Mesoamerica architecture">
          Ruinas <span class="nav-dot"></span>
        </button>
      </div>
      <div class="nav-item">
        <button class="nav-btn" data-q="historic city view engraving urban panorama 19th century">
          Ciudades <span class="nav-dot"></span>
        </button>
      </div>
      <div class="nav-item">
        <button class="nav-btn" data-q="architectural ornament detail capital column molding decorative">
          Ornamento <span class="nav-dot"></span>
        </button>
      </div>

      <button class="random-btn" id="randomBtn">Aleatoria</button>
    </nav>

    <div class="library-panel" id="libraryPanel">
      <button class="library-back" id="libraryBack">← Categorías</button>
      <div class="library-cat-label" id="libraryCatLabel"></div>
      <div class="library" id="library"></div>
    </div>
  </aside>

  <div class="canvas-wrap" id="canvasWrap">
    <div class="canvas-hint" id="canvasHint">
      <div class="canvas-hint-title">PUBLIC DOMAIN<br>ARCHITECTURE</div>
      <div class="canvas-hint-sub">Selecciona imágenes para comenzar</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusItems">0 elementos</span>
  <span id="statusCat">—</span>
</div>

<script>
const WIKI_API = 'https://commons.wikimedia.org/w/api.php';
let dragState = null, resizeState = null, itemCount = 0;
let currentQ = '';
let isLoading = false, hasMore = true, lastOffset = 0;
let isGrayscale = false;

async function fetchImages(query, offset = 0) {
  const p = new URLSearchParams({
    action: 'query', generator: 'search',
    gsrsearch: `${query} filetype:bitmap`,
    gsrnamespace: 6, gsrlimit: 20, gsroffset: offset,
    prop: 'imageinfo', iiprop: 'url|size',
    iiurlwidth: 300, format: 'json', origin: '*'
  });
  try {
    const r = await fetch(`${WIKI_API}?${p}`);
    const d = await r.json();
    return {
      imgs: d.query?.pages ? Object.values(d.query.pages)
        .filter(p => p.imageinfo?.[0]?.thumburl)
        .map(p => ({ thumb: p.imageinfo[0].thumburl, full: p.imageinfo[0].url })) : [],
      more: !!d.continue
    };
  } catch { return { imgs: [], more: false }; }
}

async function loadImages(query, reset = true) {
  if (isLoading) return;
  const lib = document.getElementById('library');
  if (reset) {
    lib.innerHTML = '<div class="lib-msg">Cargando...</div>';
    lastOffset = 0; hasMore = true;
  }
  isLoading = true;
  const { imgs, more } = await fetchImages(query, lastOffset);
  if (reset) lib.innerHTML = '';
  if (!imgs.length && reset) {
    lib.innerHTML = '<div class="lib-msg">Sin resultados</div>';
    isLoading = false; return;
  }
  imgs.forEach(img => {
    const d = document.createElement('div');
    d.className = 'lib-img';
    d.innerHTML = `<img src="${img.thumb}" loading="lazy"><div class="overlay">+</div>`;
    if (isGrayscale) d.style.filter = 'grayscale(100%)';
    d.addEventListener('click', () => {
      addItem(img.thumb, img.full);
      if (window.innerWidth <= 640) toggleSidebarFn();
    });
    lib.appendChild(d);
  });
  lastOffset += 20;
  hasMore = more;
  isLoading = false;
}

document.getElementById('library').addEventListener('scroll', function() {
  if (this.scrollHeight - this.scrollTop - this.clientHeight < 150 && !isLoading && hasMore) {
    loadImages(currentQ, false);
  }
});

function showLibrary(label, query) {
  currentQ = query;
  document.getElementById('statusCat').textContent = label;
  document.getElementById('libraryCatLabel').textContent = label;
  document.getElementById('navMenu').classList.add('hidden');
  document.getElementById('libraryPanel').classList.add('visible');
  loadImages(query);
}

function addItem(thumb, full) {
  document.getElementById('canvasHint').style.opacity = '0';
  const wrap = document.getElementById('canvasWrap');
  const id = ++itemCount;
  const size = 160 + Math.random() * 100;
  const x = 20 + Math.random() * Math.max(20, wrap.offsetWidth - size - 40);
  const y = 20 + Math.random() * Math.max(20, wrap.offsetHeight - size - 40);
  const el = document.createElement('div');
  el.className = 'c-item';
  el.dataset.id = id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;z-index:${id}`;
  const filterStyle = isGrayscale ? 'filter:grayscale(100%)' : '';
  el.innerHTML = `
    <div class="c-inner">
      <div class="c-controls">
        <button class="c-ctrl" data-a="up">↑</button>
        <button class="c-ctrl" data-a="down">↓</button>
        <button class="c-ctrl" data-a="del">×</button>
      </div>
      <img src="${thumb}" data-full="${full}" draggable="false" style="${filterStyle}">
      <div class="c-resize"></div>
    </div>`;
  el.addEventListener('mousedown', onItemDown);
  el.addEventListener('touchstart', onItemTouch, { passive: false });
  el.querySelectorAll('.c-ctrl').forEach(b => {
    b.addEventListener('mousedown', e => e.stopPropagation());
    b.addEventListener('click', e => {
      e.stopPropagation();
      if (b.dataset.a === 'del') { el.remove(); updateStatus(); }
      if (b.dataset.a === 'up') el.style.zIndex = +el.style.zIndex + 1;
      if (b.dataset.a === 'down') el.style.zIndex = Math.max(1, +el.style.zIndex - 1);
    });
  });
  el.querySelector('.c-resize').addEventListener('mousedown', onResizeDown);
  el.querySelector('.c-resize').addEventListener('touchstart', onResizeTouch, { passive: false });
  wrap.appendChild(el);
  selectItem(el);
  updateStatus();
}

function selectItem(el) {
  document.querySelectorAll('.c-item').forEach(i => i.classList.remove('selected'));
  if (el) el.classList.add('selected');
}

function onItemDown(e) {
  if (e.target.classList.contains('c-resize') || e.target.classList.contains('c-ctrl')) return;
  e.preventDefault();
  selectItem(e.currentTarget);
  dragState = { el: e.currentTarget, sx: e.clientX - e.currentTarget.offsetLeft, sy: e.clientY - e.currentTarget.offsetTop };
}

function onResizeDown(e) {
  e.preventDefault(); e.stopPropagation();
  const el = e.target.closest('.c-item');
  resizeState = { el, sx: e.clientX, sy: e.clientY, sw: el.offsetWidth, sh: el.offsetHeight };
}

document.addEventListener('mousemove', e => {
  if (dragState) {
    const wrap = document.getElementById('canvasWrap');
    dragState.el.style.left = Math.max(0, Math.min(e.clientX - dragState.sx, wrap.offsetWidth - dragState.el.offsetWidth)) + 'px';
    dragState.el.style.top = Math.max(0, Math.min(e.clientY - dragState.sy, wrap.offsetHeight - dragState.el.offsetHeight)) + 'px';
  }
  if (resizeState) {
    resizeState.el.style.width = Math.max(60, resizeState.sw + e.clientX - resizeState.sx) + 'px';
    resizeState.el.style.height = Math.max(60, resizeState.sh + e.clientY - resizeState.sy) + 'px';
  }
});

document.addEventListener('mouseup', () => { dragState = null; resizeState = null; });

function onItemTouch(e) {
  if (e.target.classList.contains('c-resize')) return;
  selectItem(e.currentTarget);
  const t = e.touches[0];
  dragState = { el: e.currentTarget, sx: t.clientX - e.currentTarget.offsetLeft, sy: t.clientY - e.currentTarget.offsetTop };
}

function onResizeTouch(e) {
  e.preventDefault(); e.stopPropagation();
  const el = e.target.closest('.c-item');
  const t = e.touches[0];
  resizeState = { el, sx: t.clientX, sy: t.clientY, sw: el.offsetWidth, sh: el.offsetHeight };
}

document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  if (dragState) {
    const wrap = document.getElementById('canvasWrap');
    dragState.el.style.left = Math.max(0, Math.min(t.clientX - dragState.sx, wrap.offsetWidth - dragState.el.offsetWidth)) + 'px';
    dragState.el.style.top = Math.max(0, Math.min(t.clientY - dragState.sy, wrap.offsetHeight - dragState.el.offsetHeight)) + 'px';
    e.preventDefault();
  }
  if (resizeState) {
    resizeState.el.style.width = Math.max(60, resizeState.sw + t.clientX - resizeState.sx) + 'px';
    resizeState.el.style.height = Math.max(60, resizeState.sh + t.clientY - resizeState.sy) + 'px';
    e.preventDefault();
  }
}, { passive: false });

document.addEventListener('touchend', () => { dragState = null; resizeState = null; });

document.getElementById('canvasWrap').addEventListener('mousedown', e => {
  if (e.target === e.currentTarget || e.target.closest('.canvas-hint')) selectItem(null);
});

document.querySelectorAll('.nav-btn[data-q]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    showLibrary(btn.textContent.trim(), btn.dataset.q);
  });
});

document.getElementById('libraryBack').addEventListener('click', () => {
  document.getElementById('navMenu').classList.remove('hidden');
  document.getElementById('libraryPanel').classList.remove('visible');
});

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  showLibrary(`"${q}"`, q);
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

document.getElementById('randomBtn').addEventListener('click', async () => {
  const queries = [
    'historic building architecture photograph exterior',
    'architectural drawing plan elevation vintage',
    'ancient ruins Greece Rome architecture',
    'historic city view engraving urban',
    'architectural ornament column capital detail'
  ];
  const q = queries[Math.floor(Math.random() * queries.length)];
  const { imgs } = await fetchImages(q);
  if (imgs.length) addItem(imgs[Math.floor(Math.random() * imgs.length)].thumb, imgs[0].full);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.querySelectorAll('.c-item').forEach(el => el.remove());
  document.getElementById('canvasHint').style.opacity = '1';
  updateStatus();
});

document.getElementById('colorBtn').addEventListener('click', () => {
  isGrayscale = !isGrayscale;
  const btn = document.getElementById('colorBtn');
  btn.textContent = isGrayscale ? 'B&N' : 'Color';
  btn.classList.toggle('active', isGrayscale);
  const f = isGrayscale ? 'grayscale(100%)' : 'none';
  document.querySelectorAll('.c-item img, .lib-img').forEach(el => el.style.filter = f);
});

function updateStatus() {
  const n = document.querySelectorAll('.c-item').length;
  document.getElementById('statusItems').textContent = `${n} elemento${n !== 1 ? 's' : ''}`;
}

function toggleSidebarFn() { document.getElementById('sidebar').classList.toggle('open'); }
document.getElementById('toggleSidebar').addEventListener('click', toggleSidebarFn);

document.getElementById('downloadBtn').addEventListener('click', async () => {
  const btn = document.getElementById('downloadBtn');
  btn.textContent = '...'; btn.disabled = true;
  try {
    if (typeof html2canvas === 'undefined') {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    const canvas = await html2canvas(document.getElementById('canvasWrap'), {
      useCORS: true, allowTaint: false, backgroundColor: '#f8f8f6', scale: 2
    });
    const link = document.createElement('a');
    link.download = `pda-${Date.now()}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
  } catch { alert('Error al exportar. Intenta en Chrome.'); }
  finally { btn.textContent = 'Descargar'; btn.disabled = false; }
});

function animateLogo() {
  const el = document.getElementById('logoText');
  el.innerHTML = '';
  [...'PUBLIC DOMAIN ARCHITECTURE'].forEach((char, i) => {
    const s = document.createElement('span');
    s.className = 'char';
    s.textContent = char === ' ' ? '\u00A0' : char;
    s.style.animationDelay = (i * 50) + 'ms';
    el.appendChild(s);
  });
}

animateLogo();
setInterval(animateLogo, 6000);
</script>
</body>
</html>
