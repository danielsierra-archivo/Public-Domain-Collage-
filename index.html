<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVO — Collage Maker</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1410;
    --paper: #f2ead8;
    --paper-dark: #e8dcc4;
    --accent: #8b2e0f;
    --muted: #9e8e78;
    --border: #c8b89a;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'IM Fell English', serif;
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent);
    font-style: italic;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  button {
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    border: none;
    outline: none;
  }

  .btn {
    padding: 7px 14px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink);
    transition: all 0.15s;
  }

  .btn:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .btn-accent {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }

  .btn-accent:hover {
    background: #6e2409;
    border-color: #6e2409;
  }

  /* LAYOUT */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--paper-dark);
    overflow: hidden;
  }

  .sidebar-top {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-top label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }

  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-bottom: 10px;
  }

  .cat-btn {
    padding: 6px 4px;
    font-size: 9px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--muted);
    transition: all 0.15s;
    text-align: center;
  }

  .cat-btn:hover, .cat-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .random-btn {
    width: 100%;
    padding: 8px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px dashed var(--accent);
    background: transparent;
    color: var(--accent);
    transition: all 0.15s;
  }

  .random-btn:hover {
    background: var(--accent);
    color: var(--paper);
  }

  /* IMAGE LIBRARY */
  .library {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    align-content: start;
  }

  .library::-webkit-scrollbar { width: 4px; }
  .library::-webkit-scrollbar-track { background: transparent; }
  .library::-webkit-scrollbar-thumb { background: var(--border); }

  .lib-img-wrap {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: grab;
    transition: all 0.15s;
    background: var(--paper);
  }

  .lib-img-wrap:hover {
    border-color: var(--ink);
    transform: scale(1.02);
  }

  .lib-img-wrap:active { cursor: grabbing; }

  .lib-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    display: block;
  }

  .lib-img-wrap .add-icon {
    position: absolute;
    inset: 0;
    background: rgba(26,20,16,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    font-size: 22px;
    color: var(--paper);
  }

  .lib-img-wrap:hover .add-icon { opacity: 1; }

  .loading-msg, .empty-msg {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 20px 0;
    text-transform: uppercase;
  }

  /* CANVAS AREA */
  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(rgba(200,184,154,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,184,154,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    background-color: #ede5cf;
  }

  .canvas-hint {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0.35;
    gap: 8px;
  }

  .canvas-hint-title {
    font-family: 'IM Fell English', serif;
    font-size: 28px;
    font-style: italic;
    color: var(--muted);
  }

  .canvas-hint-sub {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* CANVAS ITEMS */
  .canvas-item {
    position: absolute;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

  .canvas-item:active { cursor: grabbing; }

  .canvas-item.selected .item-inner {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .item-inner {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .canvas-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }

  .item-controls {
    position: absolute;
    top: -28px;
    right: 0;
    display: none;
    gap: 4px;
  }

  .canvas-item.selected .item-controls { display: flex; }

  .item-ctrl-btn {
    width: 22px;
    height: 22px;
    background: var(--ink);
    color: var(--paper);
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: none;
  }

  .item-ctrl-btn:hover { background: var(--accent); }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 14px;
    height: 14px;
    background: var(--accent);
    cursor: se-resize;
    display: none;
  }

  .canvas-item.selected .resize-handle { display: block; }

  /* STATUS BAR */
  .statusbar {
    padding: 6px 16px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    gap: 20px;
    flex-shrink: 0;
    background: var(--paper);
  }
</style>
</head>
<body>

<header>
  <div class="logo">ARCHIVO <span>bruto</span></div>
  <div class="header-actions">
    <button class="btn" id="clearBtn">Limpiar</button>
    <button class="btn btn-accent" id="downloadBtn">Descargar</button>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <label>Categoría</label>
      <div class="category-grid">
        <button class="cat-btn active" data-cat="botanical illustration">Botánica</button>
        <button class="cat-btn" data-cat="antique map">Mapas</button>
        <button class="cat-btn" data-cat="vintage portrait painting">Retratos</button>
        <button class="cat-btn" data-cat="anatomy illustration">Anatomía</button>
        <button class="cat-btn" data-cat="astronomical diagram">Astronomía</button>
        <button class="cat-btn" data-cat="medieval illuminated manuscript">Medieval</button>
      </div>
      <button class="random-btn" id="randomBtn">⊕ Imagen aleatoria</button>
    </div>
    <div class="library" id="library">
      <div class="loading-msg">Cargando...</div>
    </div>
  </aside>

  <div class="canvas-area" id="canvasArea">
    <div class="canvas-hint" id="canvasHint">
      <div class="canvas-hint-title">Tu collage</div>
      <div class="canvas-hint-sub">Haz clic en las imágenes para añadirlas</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusItems">0 elementos</span>
  <span id="statusCat">Categoría: Botánica</span>
</div>

<script>
const WIKI_API = 'https://en.wikipedia.org/w/api.php';
let items = [];
let selectedId = null;
let currentCat = 'botanical illustration';
let itemCount = 0;

// Drag state
let dragState = null;
let resizeState = null;

// ---- WIKIMEDIA FETCH ----
async function fetchImages(query, count = 20) {
  const params = new URLSearchParams({
    action: 'query',
    generator: 'search',
    gsrsearch: `${query} filetype:bitmap`,
    gsrnamespace: 6,
    gsrlimit: count,
    prop: 'imageinfo',
    iiprop: 'url|size',
    iiurlwidth: 300,
    format: 'json',
    origin: '*'
  });

  try {
    const res = await fetch(`${WIKI_API}?${params}`);
    const data = await res.json();
    if (!data.query || !data.query.pages) return [];
    return Object.values(data.query.pages)
      .filter(p => p.imageinfo && p.imageinfo[0].thumburl)
      .map(p => ({
        thumb: p.imageinfo[0].thumburl,
        full: p.imageinfo[0].url,
        title: p.title.replace('File:', '').replace(/\.[^.]+$/, '')
      }));
  } catch(e) {
    return [];
  }
}

async function loadCategory(cat) {
  const lib = document.getElementById('library');
  lib.innerHTML = '<div class="loading-msg">Cargando...</div>';
  document.getElementById('statusCat').textContent = `Categoría: ${getCatLabel(cat)}`;

  const imgs = await fetchImages(cat, 24);
  lib.innerHTML = '';

  if (!imgs.length) {
    lib.innerHTML = '<div class="empty-msg">Sin resultados</div>';
    return;
  }

  imgs.forEach(img => {
    const wrap = document.createElement('div');
    wrap.className = 'lib-img-wrap';
    wrap.title = img.title;
    wrap.innerHTML = `
      <img src="${img.thumb}" alt="${img.title}" loading="lazy">
      <div class="add-icon">+</div>
    `;
    wrap.addEventListener('click', () => addToCanvas(img.thumb, img.full));
    lib.appendChild(wrap);
  });
}

function getCatLabel(cat) {
  const map = {
    'botanical illustration': 'Botánica',
    'antique map': 'Mapas',
    'vintage portrait painting': 'Retratos',
    'anatomy illustration': 'Anatomía',
    'astronomical diagram': 'Astronomía',
    'medieval illuminated manuscript': 'Medieval'
  };
  return map[cat] || cat;
}

// ---- CANVAS ----
function addToCanvas(thumb, full) {
  const area = document.getElementById('canvasArea');
  document.getElementById('canvasHint').style.opacity = '0';

  const id = ++itemCount;
  const size = 180 + Math.random() * 80;
  const x = 40 + Math.random() * (area.offsetWidth - size - 80);
  const y = 40 + Math.random() * (area.offsetHeight - size - 80);

  const el = document.createElement('div');
  el.className = 'canvas-item';
  el.dataset.id = id;
  el.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;`;

  el.innerHTML = `
    <div class="item-inner">
      <div class="item-controls">
        <button class="item-ctrl-btn" data-action="up" title="Subir capa">↑</button>
        <button class="item-ctrl-btn" data-action="down" title="Bajar capa">↓</button>
        <button class="item-ctrl-btn" data-action="delete" title="Eliminar">×</button>
      </div>
      <img src="${thumb}" data-full="${full}" draggable="false">
      <div class="resize-handle"></div>
    </div>
  `;

  // Drag
  el.addEventListener('mousedown', onItemMouseDown);

  // Controls
  el.querySelectorAll('.item-ctrl-btn').forEach(btn => {
    btn.addEventListener('mousedown', e => e.stopPropagation());
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const action = btn.dataset.action;
      if (action === 'delete') { el.remove(); updateStatus(); }
      if (action === 'up') el.style.zIndex = (parseInt(el.style.zIndex || 0) + 1);
      if (action === 'down') el.style.zIndex = Math.max(0, (parseInt(el.style.zIndex || 0) - 1));
    });
  });

  // Resize
  el.querySelector('.resize-handle').addEventListener('mousedown', onResizeMouseDown);

  area.appendChild(el);
  selectItem(el);
  updateStatus();
}

function selectItem(el) {
  document.querySelectorAll('.canvas-item').forEach(i => i.classList.remove('selected'));
  if (el) el.classList.add('selected');
  selectedId = el ? el.dataset.id : null;
}

function onItemMouseDown(e) {
  if (e.target.classList.contains('resize-handle') || e.target.classList.contains('item-ctrl-btn')) return;
  e.preventDefault();
  const el = e.currentTarget;
  selectItem(el);
  dragState = {
    el,
    startX: e.clientX - el.offsetLeft,
    startY: e.clientY - el.offsetTop
  };
}

function onResizeMouseDown(e) {
  e.preventDefault();
  e.stopPropagation();
  const el = e.target.closest('.canvas-item');
  resizeState = {
    el,
    startX: e.clientX,
    startY: e.clientY,
    startW: el.offsetWidth,
    startH: el.offsetHeight
  };
}

document.addEventListener('mousemove', e => {
  if (dragState) {
    const area = document.getElementById('canvasArea');
    const rect = area.getBoundingClientRect();
    let x = e.clientX - dragState.startX;
    let y = e.clientY - dragState.startY;
    x = Math.max(0, Math.min(x, area.offsetWidth - dragState.el.offsetWidth));
    y = Math.max(0, Math.min(y, area.offsetHeight - dragState.el.offsetHeight));
    dragState.el.style.left = x + 'px';
    dragState.el.style.top = y + 'px';
  }
  if (resizeState) {
    const dx = e.clientX - resizeState.startX;
    const dy = e.clientY - resizeState.startY;
    const newW = Math.max(60, resizeState.startW + dx);
    const newH = Math.max(60, resizeState.startH + dy);
    resizeState.el.style.width = newW + 'px';
    resizeState.el.style.height = newH + 'px';
  }
});

document.addEventListener('mouseup', () => {
  dragState = null;
  resizeState = null;
});

document.getElementById('canvasArea').addEventListener('mousedown', e => {
  if (e.target === e.currentTarget || e.target.id === 'canvasHint' || e.target.closest('.canvas-hint')) {
    selectItem(null);
  }
});

// ---- BUTTONS ----
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    loadCategory(currentCat);
  });
});

document.getElementById('randomBtn').addEventListener('click', async () => {
  const randomTerms = ['engraving', 'vintage illustration', 'woodcut print', 'etching antique', 'lithograph 19th century'];
  const term = randomTerms[Math.floor(Math.random() * randomTerms.length)];
  const imgs = await fetchImages(term, 1);
  if (imgs.length) addToCanvas(imgs[0].thumb, imgs[0].full);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.querySelectorAll('.canvas-item').forEach(el => el.remove());
  document.getElementById('canvasHint').style.opacity = '0.35';
  updateStatus();
});

document.getElementById('downloadBtn').addEventListener('click', downloadCollage);

function updateStatus() {
  const count = document.querySelectorAll('.canvas-item').length;
  document.getElementById('statusItems').textContent = `${count} elemento${count !== 1 ? 's' : ''}`;
}

// ---- DOWNLOAD (html2canvas via CDN) ----
async function downloadCollage() {
  const btn = document.getElementById('downloadBtn');
  btn.textContent = 'Procesando...';
  btn.disabled = true;

  try {
    if (typeof html2canvas === 'undefined') {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    }

    // Load full-res images
    const canvasItems = document.querySelectorAll('.canvas-item img');
    await Promise.all([...canvasItems].map(img => {
      return new Promise(res => {
        const hi = new Image();
        hi.crossOrigin = 'anonymous';
        hi.onload = () => { img.src = hi.src; res(); };
        hi.onerror = res;
        hi.src = img.dataset.full || img.src;
      });
    }));

    const area = document.getElementById('canvasArea');
    const canvas = await html2canvas(area, {
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#ede5cf',
      scale: 2
    });

    const link = document.createElement('a');
    link.download = `archivo-bruto-${Date.now()}.jpg`;
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
  } catch(e) {
    alert('No se pudo exportar. Intenta con menos imágenes o prueba en Chrome.');
  } finally {
    btn.textContent = 'Descargar';
    btn.disabled = false;
  }
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
}

// ---- INIT ----
loadCategory(currentCat);
</script>
</body>
</html>
